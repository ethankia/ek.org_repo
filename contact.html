<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EK Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-container {
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .form-input { background: #2d2d2d; border: 1px solid #404040; transition: all 0.3s ease; }
        .form-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
            outline: none;
        }
        .glow-text { text-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<nav class="fixed top-0 w-full bg-gray-900/80 backdrop-blur-md z-50 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <h1 class="text-xl font-bold code-font gradient-text">EK Development</h1>
        </div>
    </div>
</nav>

<section class="pt-24 pb-12 bg-gradient-to-br from-gray-900 via-purple-900/20 to-blue-900/20 text-center">
    <h1 class="text-5xl md:text-6xl font-bold mb-6 glow-text">Get In Touch</h1>
    <p class="text-xl text-gray-300 mb-8">Ready to start your project? Let's discuss your requirements</p>
</section>

<section class="py-16">
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 grid md:grid-cols-2 gap-12">

<!-- Contact Form -->
<div class="form-container rounded-xl p-8">
<h2 class="text-3xl font-bold mb-6 gradient-text">Project Inquiry</h2>

<form id="contact-form" class="space-y-6">

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Name *</label>
<input type="text" id="name" required
class="w-full px-4 py-3 rounded-lg form-input text-white">
</div>

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Discord Username *</label>
<input type="text" id="discord" required
class="w-full px-4 py-3 rounded-lg form-input text-white">
</div>

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Payment Method *</label>
<select id="paymentMethod" required
class="w-full px-4 py-3 rounded-lg form-input text-white">
<option value="">Select payment method</option>
<option>CashApp</option>
<option>PayPal</option>
<option>Apple Pay</option>
<option>Multiple</option>
<option>Other</option>
</select>
</div>

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Project Type *</label>
<select id="projectType" required
class="w-full px-4 py-3 rounded-lg form-input text-white">
<option value="">Select project type</option>
<option>Website</option>
<option>Mobile App</option>
</select>
</div>

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Do you understand that more questions will be asked via DM's? *</label>
<select id="understanding" required
class="w-full px-4 py-3 rounded-lg form-input text-white">
<option value="">Please select</option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label class="block text-sm font-medium text-gray-300 mb-2">Additional Details</label>
<textarea id="message" rows="4"
class="w-full px-4 py-3 rounded-lg form-input text-white"></textarea>
</div>

<button type="submit"
class="w-full bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift">
Send Message
</button>

</form>
</div>

<!-- Alternative Contact -->
<div>
<h3 class="text-2xl font-bold mb-4 gradient-text">Alternative Contact</h3>

<div class="flex flex-col gap-4">

<a href="https://discord.gg/ajabWB9GEe" target="_blank"
class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift text-center">
Join Discord Server
</a>

<a href="mailto:ethankia1619@gmail.com"
class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift text-center">
Email: ethankia1619@gmail.com
</a>

<a href="sms:6163870268?body=SITE%20(Do%20not%20change%20anything%20in%20this%20message)"
class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold hover-lift text-center">
Text 616-387-0268
</a>

</div>
</div>

</div>
</section>

<footer class="bg-gray-900 border-t border-gray-800 py-8 text-center">
<p class="text-gray-400 code-font">© 2026 EK Development. All rights reserved.</p>
</footer>

<!-- Webhook Script -->
<script>
document.getElementById("contact-form").addEventListener("submit", async function(e) {
e.preventDefault();

const payload = {
embeds: [{
title: "New Project Inquiry",
color: 0x8b5cf6,
fields: [
{ name: "Name", value: document.getElementById("name").value, inline: true },
{ name: "Discord", value: document.getElementById("discord").value, inline: true },
{ name: "Payment Method", value: document.getElementById("paymentMethod").value, inline: true },
{ name: "Project Type", value: document.getElementById("projectType").value, inline: true },
{ name: "Understands DM Questions", value: document.getElementById("understanding").value, inline: true },
{ name: "Additional Details", value: document.getElementById("message").value || "None provided" }
],
timestamp: new Date()
}]
};

await fetch("https://discord.com/api/webhooks/1448118196745015367/Q-k8Bk4gm1MkB3MYBgrkciAR4VNRn5ZvJL4Q3jFDMKLlJ3LeXo_QVxBQLT9-DS_tPky2", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload)
});

alert("Message sent successfully!");
document.getElementById("contact-form").reset();
});
</script>

</body>
</html>
